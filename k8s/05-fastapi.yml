# =================================================================
# ===              FastAPI Application Service                  ===
# =================================================================
# 这个Service为FastAPI的Pod提供了一个稳定的内部网络入口(ClusterIP)。
# Ingress Controller 和其他内部服务（如果需要）都应该通过这个Service来访问应用。

apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
  namespace: my-fastapi-stack
  labels:
    app: fastapi
    # 添加这个label是为了让kube-prometheus-stack的ServiceMonitor能够自动发现并监控这个服务
    release: prometheus
spec:
  # selector将这个Service与带有'app: fastapi'标签的Pod关联起来
  selector:
    app: fastapi
  ports:
    - name: http-fastapi
      protocol: TCP
      port: 80         # Service暴露给集群内部的端口
      targetPort: 8000   # 容器内部FastAPI应用实际监听的端口

---
# =================================================================
# ===             FastAPI Application Deployment                ===
# =================================================================
# 这个Deployment负责管理FastAPI应用的Pod的生命周期，包括创建、更新和扩缩容。

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deployment
  namespace: my-fastapi-stack
  labels:
    app: fastapi
spec:
  replicas: 2 # 部署2个Pod副本以实现高可用性和负载均衡
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      # Pod的标签，必须与上面的selector.matchLabels和Service的selector匹配
      labels:
        app: fastapi
    spec:
      containers:
      - name: fastapi-app-container
        # 确保这里是你构建并推送到镜像仓库的正确镜像地址
        image: ziranziran/fastapi-app:latest
        imagePullPolicy: IfNotPresent # 在本地开发时优先使用本地镜像，避免不必要的拉取

        ports:
        - containerPort: 8000

        # --- 健康检查探针 (生产环境最佳实践) ---
        # 存活探针：如果失败（应用卡死），Kubernetes会重启容器
        livenessProbe:
          httpGet:
            path: /health # 你的应用必须实现这个端点并返回200 OK
            port: 8000
          initialDelaySeconds: 20 # 容器启动后等待20秒再开始第一次检查
          periodSeconds: 15     # 每15秒检查一次

        # 就绪探针：如果失败（应用正在启动或暂时繁忙），Pod不会接收来自Service的流量
        readinessProbe:
          httpGet:
            path: /health # 你的应用必须实现这个端点并返回200 OK
            port: 8000
          initialDelaySeconds: 15 # 容器启动后等待15秒再开始第一次检查
          periodSeconds: 10     # 每10秒检查一次

        # --- 资源请求与限制 (生产环境强烈推荐) ---
        # 帮助Kubernetes调度器做出更好的决策，并保护节点资源
        # resources:
        #   requests:
        #     cpu: "200m"      # 至少需要0.2个CPU核心
        #     memory: "256Mi"  # 至少需要256MB内存
        #   limits:
        #     cpu: "1000m"     # 最多使用1个CPU核心
        #     memory: "1024Mi" # 最多使用1GB内存

        # --- 环境变量注入 ---
        # 将ConfigMap和Secret中的数据作为环境变量注入到容器中，实现配置与代码分离
        env:
        # --- 从 ConfigMap 'fastapi-config' 引用非敏感数据 ---
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: fastapi-config
              key: DATABASE_HOST
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: fastapi-config
              key: DATABASE_NAME
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: fastapi-config
              key: REDIS_HOST
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: fastapi-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: ELASTICSEARCH_URL
          valueFrom:
            configMapKeyRef:
              name: fastapi-config
              key: ELASTICSEARCH_URL

        # --- 从 Secret 'postgres-secret' 引用敏感数据 ---
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER # 这里的键名是解码后的原始键名
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD # 这里的键名是解码后的原始键名