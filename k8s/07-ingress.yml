apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fastapi-ingress
  namespace: my-fastapi-stack
  annotations:
    # 对于Docker Desktop的Nginx Ingress，这个注解通常是必需的
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  # -------------------------------------------------------------
  # !! 关键 !! ingressClassName是必需的，尤其是在新版本中
  # 它告诉K8s使用哪个Ingress Controller来处理这个Ingress
  # -------------------------------------------------------------
  ingressClassName: nginx
  rules:
  - host: my-fastapi.local # <-- 在这里使用你的假域名
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fastapi-service
            port:
              number: 80