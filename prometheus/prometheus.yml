global:
  scrape_interval: 15s
  evaluation_interval: 15s  # 告警规则评估间隔

rule_files:
  - 'alerts.yml'  # 相对路径，基于Prometheus容器内的/etc/prometheus目录

scrape_configs:
  - job_name: 'fastapi'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['web:8000']  # 监控FastAPI

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']  # 监控PostgreSQL